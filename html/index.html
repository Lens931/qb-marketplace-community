<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Marketplace</title><link rel="stylesheet" href="style.css"></head><body>
<main id="app" class="app hidden" aria-hidden="true"><section class="shell"><header class="top"><div><p class="eyebrow">QBCore Community</p><h1 id="title">Marketplace</h1></div><button id="close" class="icon" aria-label="Fermer">×</button></header>
<nav class="tabs"><button class="tab active" data-tab="sell">Mettre en vente</button><button class="tab" data-tab="offers">Voir les offres</button><button class="tab" data-tab="mine">Mes offres</button><button class="tab" data-tab="history">Historique</button></nav>
<section class="panel active" id="sell"><div class="grid two"><div class="card"><h2>Inventaire vendable</h2><input id="inventorySearch" class="search" placeholder="Rechercher un item..."><div id="inventory" class="list"></div></div><div class="card"><h2>Pré-liste</h2><div id="drafts" class="list compact"></div><button id="confirmListings" class="btn primary">Confirmer la mise en vente</button></div></div></section>
<section class="panel" id="offers"><div class="toolbar"><input id="offersSearch" class="search" placeholder="Rechercher une offre..."><select id="offerSort"><option value="recent">Plus récent</option><option value="priceAsc">Prix croissant</option><option value="priceDesc">Prix décroissant</option></select></div><div id="offersList" class="market"></div></section>
<section class="panel" id="mine"><div id="myOffers" class="market"></div></section>
<section class="panel" id="history"><div class="earnings"><div><span>Gains disponibles</span><strong id="pending">$0</strong></div><button id="withdraw" class="btn primary">Retirer</button></div><div id="sales" class="market"></div></section>
</section><div id="toast" class="toast"></div></main><script src="app.js"></script></body></html>
